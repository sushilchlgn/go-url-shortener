[build]
  command = "chmod +x build.sh && ./build.sh"
  functions = "functions-build"
  publish = "public"

# POST /api/shorten -> the "shorten" Go function
[[redirects]]
  from = "/api/shorten"
  to = "/.netlify/functions/shorten"
  status = 200
  force = true

# GET /r/<code> -> the "redirect" Go function, forwarding <code> as part of the path
# (passing :splat as a query param to a function is unreliable on Netlify —
# see https://github.com/netlify/cli/issues/4273 — so we pass it via path instead)
[[redirects]]
  from = "/r/*"
  to = "/.netlify/functions/redirect/:splat"
  status = 200
  force = true